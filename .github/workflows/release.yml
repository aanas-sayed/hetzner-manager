name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  verify:
    name: Verify tag matches pyproject.toml version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check version
        run: |
          TOML_VERSION=$(grep '^version' pyproject.toml | cut -d'"' -f2)
          TAG="${GITHUB_REF_NAME}"
          if [ "$TAG" != "v${TOML_VERSION}" ]; then
            echo "ERROR: tag '$TAG' does not match pyproject.toml version '$TOML_VERSION' (expected 'v${TOML_VERSION}')"
            exit 1
          fi
          echo "Version check passed: $TAG == v${TOML_VERSION}"

  build:
    needs: verify
    name: Build (${{ matrix.os }}, ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: x86_64
            runner: ubuntu-latest
          - os: linux
            arch: arm64
            runner: ubuntu-24.04-arm
          - os: darwin
            arch: arm64
            runner: macos-latest
          - os: windows
            arch: x86_64
            runner: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Build binary
        run: >
          uv run --with nuitka python -m nuitka
          --onefile
          --output-filename=hw
          --output-dir=dist
          --include-data-dir=scripts=scripts
          --assume-yes-for-downloads
          --no-progressbar
          main.py

      - uses: actions/upload-artifact@v4
        with:
          name: hw-${{ github.ref_name }}-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/hw${{ matrix.os == 'windows' && '.exe' || '' }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename binaries
        run: |
          for dir in artifacts/hw-*/; do
            name=$(basename "$dir")
            if [ -f "$dir/hw.exe" ]; then
              mv "$dir/hw.exe" "artifacts/${name}.exe"
            else
              mv "$dir/hw" "artifacts/$name"
            fi
            rmdir "$dir"
          done
          ls artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/hw-*
          generate_release_notes: true
