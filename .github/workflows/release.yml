name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  verify:
    name: Verify tag matches pyproject.toml version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check version
        run: |
          TOML_VERSION=$(grep '^version' pyproject.toml | cut -d'"' -f2)
          TAG="${GITHUB_REF_NAME}"
          if [ "$TAG" != "v${TOML_VERSION}" ]; then
            echo "ERROR: tag '$TAG' does not match pyproject.toml version '$TOML_VERSION' (expected 'v${TOML_VERSION}')"
            exit 1
          fi
          echo "Version check passed: $TAG == v${TOML_VERSION}"

  build:
    needs: verify
    name: Build (${{ matrix.os }}, ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: x86_64
            runner: ubuntu-latest
            ext: tar.gz
          - os: linux
            arch: arm64
            runner: ubuntu-24.04-arm
            ext: tar.gz
          - os: darwin
            arch: arm64
            runner: macos-latest
            ext: tar.gz
          - os: windows
            arch: x86_64
            runner: windows-latest
            ext: zip

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Build (PyInstaller --onedir)
        run: uv run --with pyinstaller pyinstaller --onedir --name hw main.py

      - name: Package (Unix)
        if: matrix.os != 'windows'
        run: tar -czf hw-${{ github.ref_name }}-${{ matrix.os }}-${{ matrix.arch }}.tar.gz -C dist hw

      - name: Package (Windows)
        if: matrix.os == 'windows'
        run: Compress-Archive -Path dist\hw -DestinationPath hw-${{ github.ref_name }}-${{ matrix.os }}-${{ matrix.arch }}.zip
        shell: pwsh

      - uses: actions/upload-artifact@v4
        with:
          name: hw-${{ github.ref_name }}-${{ matrix.os }}-${{ matrix.arch }}
          path: hw-${{ github.ref_name }}-${{ matrix.os }}-${{ matrix.arch }}.${{ matrix.ext }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect archives
        run: |
          find artifacts/ -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec mv {} artifacts/ \;
          find artifacts/ -mindepth 1 -maxdepth 1 -type d -exec rm -rf {} +
          ls artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/hw-*
          generate_release_notes: true
